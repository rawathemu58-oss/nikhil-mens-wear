<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nikhil Men's Wear</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    header {
      background: black;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .hero img {
      width: 100%;
      height: 400px;
      object-fit: cover;
    }

    .container {
      padding: 20px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      border-radius: 10px;
    }

    footer {
      background: black;
      color: white;
      text-align: center;
      padding: 10px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <header>
    <h1>Nikhil Men's Wear</h1>
    <p>Trending Clothing Store in Alwar</p>
  </header>

  <!-- HERO IMAGE -->
  <div class="hero">
    <img src="store-hero.png" alt="Store">
  </div>

  <div class="container">

    <h2>Our Collection</h2>

    <div class="products">

      <div class="card">
        <img src="grey-jacket.png" alt="Jacket">
        <h3>Stylish Jacket</h3>
      </div>

      <div class="card">
        <img src="jeans-shirt.png" alt="Jeans">
        <h3>Jeans Collection</h3>
      </div>

      <div class="card">
        <img src="shirts-rack.png" alt="Shirts">
        <h3>Shirts</h3>
      </div>

      <div class="card">
        <img src="store-counter.png" alt="Store Counter">
        <h3>Our Store</h3>
      </div>

      <div class="card">
        <img src="store-interior.png" alt="Interior">
        <h3>Interior View</h3>
      </div>

    </div>

  </div>

  <footer>
    <p>© 2026 Nikhil Men's Wear</p>
  </footer>

</body>
</html>
